  <main class="calc-main">
    <div class="calc-wrap">
      <nav class="breadcrumbs" aria-label="Хлебные крошки">
        <a href="index.html">Главная</a>
        <span class="breadcrumbs-sep">»</span>
        <span class="breadcrumbs-current">Калькулятор</span>
      </nav>

      <h1 class="calc-title">Калькулятор расчета стоимости</h1>

      <form class="calc-form" id="calc-form" novalidate>
        <div class="calc-row calc-row--two">
          <div class="field">
            <label class="field-label" for="calc-from">Откуда</label>
            <select id="calc-from" class="field-select" name="from" required></select>
            <p class="field-hint">
              <span class="field-hint-icon" aria-hidden="true">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/><path d="M12 8v5M12 16h.01" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
              </span>
              Если внутри города выберите одинаковый город в «Откуда» и «Куда» (например, Бишкек — Бишкек).
            </p>
          </div>
          <div class="field">
            <label class="field-label" for="calc-to">Куда</label>
            <select id="calc-to" class="field-select" name="to" required></select>
          </div>
        </div>

        <fieldset class="calc-fieldset">
          <legend class="field-legend">Тарифы</legend>
          <label class="tariff-card tariff-card--active">
            <input type="radio" name="tariff" value="standard" checked class="visually-hidden">
            <span class="tariff-icon" aria-hidden="true">
              <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="8" y="18" width="28" height="18" rx="2" fill="#F5C518" stroke="#E8B008" stroke-width="1.5"/>
                <rect x="12" y="22" width="10" height="10" rx="1" fill="#E5252A" opacity="0.85"/>
                <circle cx="12" cy="38" r="4" fill="#333"/>
                <circle cx="34" cy="38" r="4" fill="#333"/>
                <path d="M14 18l6-8h12l6 8" stroke="#666" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
              </svg>
            </span>
            <span class="tariff-text">
              <strong>Стандарт</strong>
              <span class="tariff-sub">Доставка в течение 24 часов</span>
            </span>
          </label>
        </fieldset>

        <div class="calc-row calc-row--two">
          <div class="field">
            <label class="field-label" for="calc-weight">Вес посылки, кг</label>
            <input type="number" id="calc-weight" class="field-input" name="weight" min="0.1" max="500" step="0.1" value="2" required>
          </div>
          <div class="field">
            <label class="field-label" for="calc-cargo">Тип груза</label>
            <select id="calc-cargo" class="field-select" name="cargo">
              <option value="envelope" selected>Конверт</option>
              <option value="parcel">Посылка</option>
              <option value="cargo">Груз</option>
            </select>
          </div>
        </div>

        <p class="calc-total">Итого: <span id="calc-result">400</span></p>

        <button type="submit" class="btn btn-primary btn-calc-submit" id="calc-submit">Рассчитать стоимость</button>
      </form>
    </div>
  </main>

  <div class="recaptcha-widget" role="note">
    <span class="recaptcha-badge"></span>
    <a href="#">Конфиденциальность</a>
    <span class="sep">·</span>
    <a href="#">Условия</a>
  </div>

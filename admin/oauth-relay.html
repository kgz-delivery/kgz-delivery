<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Авторизация…</title>
  <meta name="robots" content="noindex">
  <style>
    body { font-family: system-ui, sans-serif; max-width: 24rem; margin: 4rem auto; padding: 0 1rem; color: #333; text-align: center; }
  </style>
</head>
<body>
  <p id="status">Завершаем вход…</p>
  <script>
    (function () {
      var STORAGE_KEY = "decap_cms_pending_auth";
      var CHANNEL = "decap_cms_auth";
      var status = document.getElementById("status");
      var raw = window.location.hash ? window.location.hash.slice(1) : "";

      if (!raw) {
        status.textContent = "Нет данных авторизации. Закройте окно и попробуйте снова.";
        return;
      }

      var message;
      try {
        message = decodeURIComponent(raw);
      } catch (e) {
        message = raw;
      }

      function broadcast(msg) {
        try {
          var bc = new BroadcastChannel(CHANNEL);
          bc.postMessage(msg);
          bc.close();
        } catch (e) {}
      }

      function sendToOpener(msg) {
        if (!window.opener || window.opener.closed) return false;
        try { window.opener.postMessage(msg, window.location.origin); } catch (e) {}
        try { window.opener.postMessage(msg, "*"); } catch (e) {}
        return true;
      }

      broadcast(message);

      if (sendToOpener(message)) {
        [200, 500, 1000].forEach(function (delay) {
          setTimeout(function () { sendToOpener(message); }, delay);
        });
        status.textContent = "Вход выполнен. Окно закроется…";
        setTimeout(function () { window.close(); }, 1200);
        return;
      }

      try { localStorage.setItem(STORAGE_KEY, message); } catch (e) {}
      status.textContent = "Готово! Закройте это окно и нажмите F5 на вкладке с админкой.";
      setTimeout(function () { window.close(); }, 1500);
    })();
  </script>
</body>
</html>

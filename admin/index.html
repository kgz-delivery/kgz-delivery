<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Админка INDEX — Отправления</title>
  <meta name="robots" content="noindex">
  <link rel="icon" href="data:,">
  <script>
    (function () {
      var STORAGE_KEY = "decap_cms_pending_auth";
      var CHANNEL = "decap_cms_auth";

      function deliverAuth(message) {
        if (typeof message !== "string" || message.indexOf("authorization:") !== 0) return;
        try { window.postMessage(message, window.location.origin); } catch (e) {}
        try { window.postMessage(message, "*"); } catch (e) {}
      }

      try {
        var pending = localStorage.getItem(STORAGE_KEY);
        if (pending) {
          localStorage.removeItem(STORAGE_KEY);
          setTimeout(function () { deliverAuth(pending); }, 300);
          setTimeout(function () { deliverAuth(pending); }, 1000);
          setTimeout(function () { deliverAuth(pending); }, 2000);
        }
      } catch (e) {}

      try {
        var bc = new BroadcastChannel(CHANNEL);
        bc.onmessage = function (event) {
          deliverAuth(event.data);
        };
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
</body>
</html>
